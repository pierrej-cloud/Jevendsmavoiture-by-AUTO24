[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npx next build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npx next start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
